name: Build dist notebooks

on:
  push:
    branches: [main]
    paths:
      - 'Notebooks/**/notebook-content.py'
      - 'scripts/build_notebooks.py'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Notebooks/dist/ from notebook-content.py sources
        run: python scripts/build_notebooks.py

      - name: Commit updated Notebooks/dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Notebooks/dist/
          git diff --staged --quiet || git commit -m "Rebuild Notebooks/dist/ from source [skip ci]"
          git push
